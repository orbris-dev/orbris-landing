<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbris LLC — Shop Our Products</title>
  <meta name="description" content="Shop Orbris products on Amazon and TikTok Shop.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .tagline {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .links a i { font-size: 1.25rem; flex-shrink: 0; }
    .amazon { background: #ff9900; color: #0f172a; }
    .tiktok { background: #f8fafc; color: #0f172a; }
    footer {
      margin-top: 3rem;
      color: #475569;
      font-size: 0.85rem;
    }
    .contact {
      margin-top: 2rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .contact a { color: #94a3b8; text-decoration: none; }
    .contact a:hover { color: #f8fafc; }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="logo">ORBRIS</h1>
    <p class="tagline">Shop our products</p>
    <div class="links">
      <a href="https://www.amazon.com/s?me=A1YEUIDML3NTYP&marketplaceID=ATVPDKIKX0DER" target="_blank" rel="noopener" class="amazon">
        <i class="fa-brands fa-amazon"></i> Shop on Amazon
      </a>
      <a href="https://www.tiktok.com/shop/store/orbris/7494173170342200521" target="_blank" rel="noopener" class="tiktok">
        <i class="fa-brands fa-tiktok"></i> Shop on TikTok
      </a>
    </div>
    <p class="contact"><i class="fa-solid fa-envelope"></i> <a href="mailto:info@orbris.com">info@orbris.com</a></p>
    <footer>&copy; 2025 Orbris LLC</footer>
  </main>
</body>
</html>
